<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z • Быстрый Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        .upload-zone {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .upload-zone.dragover {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center text-2xl">⚡</div>
                <div>
                    <h1 class="title text-4xl font-semibold tracking-tighter">Z</h1>
                    <p class="text-zinc-500 text-sm -mt-1">быстрый share</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="p-3 rounded-2xl hover:bg-zinc-800 transition-colors">
                    <i class="fas fa-moon text-xl"></i>
                </button>
                <a href="https://github.com/nasqwww/z" target="_blank" class="flex items-center gap-2 px-5 py-3 bg-white/10 hover:bg-white/20 rounded-2xl transition-colors">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
            </div>
        </div>

        <!-- Main Upload -->
        <div id="upload-area" class="upload-zone border-4 border-dashed border-zinc-700 rounded-3xl p-16 text-center cursor-pointer">
            <div class="mx-auto w-20 h-20 bg-zinc-800 rounded-2xl flex items-center justify-center mb-6">
                <i class="fas fa-cloud-upload-alt text-5xl text-blue-400"></i>
            </div>
            <h2 class="text-3xl font-medium mb-2">Перетащи файлы сюда</h2>
            <p class="text-zinc-400 mb-8">или нажми для выбора • фото, видео, код, текст, всё подряд</p>
            
            <input type="file" id="file-input" multiple class="hidden">
            <button onclick="document.getElementById('file-input').click()" 
                    class="px-8 py-4 bg-white text-black font-medium rounded-2xl hover:bg-white/90 transition-all flex items-center gap-3 mx-auto">
                <i class="fas fa-plus"></i>
                Выбрать файлы
            </button>
        </div>

        <!-- Text / Code Input -->
        <div class="mt-8 bg-zinc-900 rounded-3xl p-6">
            <textarea id="text-input" rows="6" 
                      class="w-full bg-transparent border border-zinc-700 rounded-2xl p-6 text-lg focus:outline-none focus:border-blue-500 resize-y min-h-[140px]"
                      placeholder="Вставь текст, код или заметку здесь..."></textarea>
            <div class="flex gap-3 mt-4">
                <button onclick="shareText()" 
                        class="flex-1 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-medium transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-share"></i> Поделиться текстом
                </button>
            </div>
        </div>

        <!-- Previews -->
        <div id="previews" class="mt-8 grid grid-cols-2 md:grid-cols-3 gap-4"></div>

        <!-- Share Links -->
        <div id="share-section" class="hidden mt-12 bg-zinc-900 rounded-3xl p-8">
            <h3 class="text-xl font-medium mb-6 flex items-center gap-3">
                <i class="fas fa-link"></i> Ссылки для шаринга
            </h3>
            <div id="share-links" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let files = [];
        let currentTheme = 'dark';

        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const previews = document.getElementById('previews');

        function toggleTheme() {
            alert('Тема переключается (в полной версии будет dark/light mode)');
        }

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(newFiles) {
            for (let file of newFiles) {
                files.push(file);
                createPreview(file);
            }
            showShareOptions();
        }

        function createPreview(file) {
            const div = document.createElement('div');
            div.className = 'bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 group';
            
            const url = URL.createObjectURL(file);
            
            if (file.type.startsWith('image/')) {
                div.innerHTML = `
                    <img src="${url}" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <p class="font-medium truncate">${file.name}</p>
                        <p class="text-xs text-zinc-500">${(file.size/1024/1024).toFixed(2)} MB</p>
                    </div>
                `;
            } else if (file.type.startsWith('video/')) {
                div.innerHTML = `
                    <video src="${url}" class="w-full h-48 object-cover" muted></video>
                    <div class="p-4">
                        <p class="font-medium truncate">${file.name}</p>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="h-48 bg-zinc-800 flex items-center justify-center">
                        <i class="fas fa-file text-6xl text-zinc-600"></i>
                    </div>
                    <div class="p-4">
                        <p class="font-medium truncate">${file.name}</p>
                        <p class="text-xs text-zinc-500">${file.type || 'unknown'}</p>
                    </div>
                `;
            }
            previews.appendChild(div);
        }

        function showShareOptions() {
            document.getElementById('share-section').classList.remove('hidden');
            const linksDiv = document.getElementById('share-links');
            linksDiv.innerHTML = `
                <div class="p-6 bg-zinc-800 rounded-2xl">
                    <p class="text-emerald-400 mb-2">✅ Загружено ${files.length} файлов</p>
                    <div class="flex gap-3">
                        <button onclick="copyLink()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-medium">Копировать ссылку</button>
                        <button onclick="generateQR()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-2xl font-medium">QR-код</button>
                    </div>
                </div>
            `;
        }

        function shareText() {
            const text = document.getElementById('text-input').value.trim();
            if (!text) return alert('Напиши что-нибудь!');
            
            alert('Текст готов к шарингу! В полной версии сохранится и даст короткую ссылку.');
            document.getElementById('share-section').classList.remove('hidden');
        }

        function copyLink() {
            navigator.clipboard.writeText('https://nasqwww.github.io/z/share/' + Date.now());
            alert('Ссылка скопирована! Открывай на любом устройстве.');
        }

        function generateQR() {
            alert('QR-код для быстрого доступа с телефона (в полной версии будет реальный QR)');
        }

        console.log('%cZ Share готов 🚀\nОткрывай на телефоне и ПК', 'color: #3b82f6; font-size: 14px');
    </script>
</body>
</html>
