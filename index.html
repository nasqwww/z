<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z Share - Быстрый обмен</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f0f23, #1a1a2e); }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center p-4">
    <div class="max-w-2xl w-full">
        <div class="text-center mb-8">
            <h1 class="text-6xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Z</h1>
            <p class="text-xl mt-2">Поделись всем быстро</p>
        </div>

        <div class="glass border border-white/10 rounded-3xl p-8">
            <!-- Text area -->
            <textarea id="textInput" class="w-full h-32 bg-black/30 border border-white/20 rounded-2xl p-4 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500" placeholder="Вставь текст или код сюда..."></textarea>
            
            <div class="flex gap-3 mt-4">
                <button onclick="shareText()" class="flex-1 bg-purple-600 hover:bg-purple-700 py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
                    <i class="fas fa-share"></i> Поделиться текстом
                </button>
                <label class="flex-1 bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-medium flex items-center justify-center gap-2 cursor-pointer">
                    <i class="fas fa-upload"></i> Загрузить файл
                    <input type="file" id="fileInput" class="hidden" multiple>
                </label>
            </div>

            <div id="preview" class="mt-6 hidden"></div>
            <div id="shareLink" class="mt-6 hidden bg-black/50 p-4 rounded-2xl"></div>
        </div>

        <div class="text-center mt-6 text-sm text-gray-400">
            Drag & Drop работает • Работает на телефоне и ПК
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', handleFiles);

        function handleFiles(e) {
            const files = e.target.files;
            if (files.length > 0) {
                showPreview(files[0]);
            }
        }

        function showPreview(file) {
            const preview = document.getElementById('preview');
            preview.classList.remove('hidden');
            preview.innerHTML = `<p class="text-green-400">Файл: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)</p>`;
            // Здесь можно добавить реальный upload позже
        }

        function shareText() {
            const text = document.getElementById('textInput').value;
            if (!text) return alert('Напиши что-нибудь!');
            
            const shareUrl = `https://nasqwww.github.io/z/?text=${encodeURIComponent(text.substring(0,500))}`;
            const linkDiv = document.getElementById('shareLink');
            linkDiv.classList.remove('hidden');
            linkDiv.innerHTML = `
                <p class="mb-2">✅ Готово! Ссылка:</p>
                <a href="${shareUrl}" class="block bg-white/10 p-3 rounded-xl break-all text-purple-300">${shareUrl}</a>
                <button onclick="copyLink('${shareUrl}')" class="mt-3 w-full bg-white text-black py-3 rounded-2xl">Копировать ссылку</button>
            `;
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url);
            alert('Ссылка скопирована! Отправь её на другой девайс.');
        }

        // Drag and drop support
        document.body.addEventListener('dragover', e => e.preventDefault());
        document.body.addEventListener('drop', e => {
            e.preventDefault();
            if (e.dataTransfer.files.length) handleFiles({target: {files: e.dataTransfer.files}});
        });
    </script>
</body>
</html>
